services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tasku-postgres
    environment:
      POSTGRES_USER: tasku
      POSTGRES_PASSWORD: tasku
      POSTGRES_DB: tasku
    ports:
      - "5432:5432"
    volumes:
      - tasku_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasku"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tasku-redis
    ports:
      - "6379:6379"

volumes:
  tasku_pgdata:
